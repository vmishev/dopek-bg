{{ define "main" }}
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="/">{{ site.Title }}</a>
    <nav aria-label="Languages">
      <ul class="lang-menu">
        {{ range site.Languages }}
          <li><a href="{{ .Lang | relLangURL }}" {{ if eq .Lang $.Site.Language.Lang }}aria-current="true"{{ end }}>{{ .LanguageName }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>

<main class="section container page">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="intro">{{ . }}</p>{{ end }}
  <div class="page-content">
    {{ .Content }}
  </div>
</main>
{{ end }}
