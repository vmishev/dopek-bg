{{ define "main" }}
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}"><img class="brand-logo" src="{{ "logo.svg" | relURL }}" alt="{{ i18n "site_browser_title" }} logo"><span>{{ i18n "site_browser_title" }}</span></a>
    <nav aria-label="Languages">
      <ul class="lang-menu">
        {{ range site.Sites }}
          <li><a href="{{ .Home.RelPermalink }}" {{ if eq .Language.Lang $.Site.Language.Lang }}aria-current="true"{{ end }}>{{ .Language.LanguageName }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>

<main class="section container page">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="intro">{{ . }}</p>{{ end }}
  <div class="page-content">
    {{ .Content }}
  </div>
</main>
{{ end }}
