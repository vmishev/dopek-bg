{{- $home := .home -}}
<section id="contact" class="section container contact">
  <h2>{{ $home.contact.headline }}</h2>
  <p>{{ $home.contact.body }}</p>
  <p><strong>{{ i18n "contact_email" }}:</strong> <a href="mailto:{{ $home.contact.email }}">{{ $home.contact.email }}</a></p>
  <p><strong>{{ i18n "contact_phone" }}:</strong> {{ $home.contact.phone }}</p>
  <p><strong>{{ i18n "contact_location" }}:</strong> {{ $home.contact.location }}</p>
</section>
