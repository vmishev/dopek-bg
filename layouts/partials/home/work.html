{{- $home := .home -}}
<section id="work" class="section container">
  <h2>{{ i18n "work_title" }}</h2>
  <div class="grid three">
    {{ range $home.gallery }}
      <article class="card gallery-item">
        <div class="image-placeholder" aria-hidden="true">{{ i18n "work_photo_placeholder" }}</div>
        <h3>{{ .title }}</h3>
        <p>{{ .caption }}</p>
      </article>
    {{ end }}
  </div>
</section>
